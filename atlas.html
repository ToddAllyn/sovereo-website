<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sovereo Atlas — Earth</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#C8A45C;--bgold:#E7B85A;--cream:#FBF8F1;--mut:#B9C3D0;--soft:#8B95A3;--line:rgba(255,255,255,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#05080f;color:var(--cream);font-family:"Inter",Arial,sans-serif;height:100vh;overflow:hidden}
.top{display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:1px solid var(--line);background:#0a1220;z-index:10;position:relative}
.wm{font-weight:800;letter-spacing:.34em;font-size:16px;color:var(--gold)}
.badge{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#0E1A2B;background:var(--bgold);padding:3px 9px;border-radius:5px;font-weight:700}
.search{margin-left:14px;position:relative}
.search input{background:#14233B;border:1px solid var(--line);color:var(--cream);border-radius:7px;padding:8px 12px;font-size:13.5px;width:220px;font-family:inherit}
.search input:focus{outline:none;border-color:var(--bgold)}
.results{position:absolute;top:38px;left:0;right:0;background:#14233B;border:1px solid var(--line);border-radius:7px;max-height:260px;overflow:auto;z-index:30;display:none}
.results div{padding:8px 12px;font-size:13.5px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05)}
.results div:hover{background:rgba(231,184,90,.14)}
.note{margin-left:auto;font-size:12px;color:var(--soft)}
.wrap{display:flex;height:calc(100vh - 53px)}
.map{flex:1;position:relative;overflow:hidden}
#glb{width:100%;height:100%}
.legend{position:absolute;left:16px;bottom:16px;background:rgba(14,26,43,.85);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--mut);z-index:5}
.legbar{height:8px;width:150px;border-radius:4px;margin:6px 0 4px;background:linear-gradient(90deg,#26364f,#8a7b45,#E7B85A)}
.panel{width:400px;flex:none;background:#0E1A2B;border-left:1px solid var(--line);overflow:auto;padding:22px 22px 40px}
.hint{color:var(--soft);font-size:14px;line-height:1.6;margin-top:30px;text-align:center}
.hint b{color:var(--bgold);font-weight:600}
.ctry{font-family:"Fraunces",Georgia,serif;font-weight:800;font-size:30px;line-height:1.05}
.reg{color:var(--soft);font-size:12.5px;margin-top:4px}
.ovrow{display:flex;align-items:baseline;gap:12px;margin:16px 0 4px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.ov{font-family:"Fraunces",Georgia,serif;font-weight:800;font-size:40px;color:var(--bgold);line-height:1}
.ovlab{font-size:12px;color:var(--soft);text-transform:uppercase;letter-spacing:.12em}
.rank{margin-left:auto;font-size:13px;color:var(--mut);text-align:right}
.plab{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);font-weight:600;margin:16px 0 8px}
.prow{display:flex;align-items:center;gap:10px;margin:9px 0}
.pnm{width:96px;flex:none;font-size:13px;color:var(--mut)}
.ptrack{flex:1;height:8px;background:rgba(255,255,255,.09);border-radius:5px;overflow:hidden}
.pfill{height:100%;border-radius:5px}
.pval{width:32px;flex:none;text-align:right;font-family:"Fraunces",Georgia,serif;font-size:15px;color:var(--cream)}
.sig{margin-top:22px;border-top:1px solid var(--line);padding-top:18px}
.item{display:block;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06);text-decoration:none;color:inherit}
.item:hover .it{color:var(--bgold)}
.tag{display:inline-block;font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:2px 7px;border-radius:4px;margin-bottom:6px}
.it{font-size:14px;line-height:1.35;color:var(--cream)}
.imeta{font-size:11.5px;color:var(--soft);margin-top:4px}
.cta{display:block;margin-top:20px;background:linear-gradient(90deg,#E7B85A,#E2571E);color:#160b06;text-align:center;font-weight:700;padding:13px;border-radius:9px;text-decoration:none;font-size:14.5px}
.loading{color:var(--soft);font-size:13px;padding:8px 0}
</style></head>
<body>
<div class="top">
  <span class="wm">SOVEREO</span><span class="badge">Atlas</span>
  <div class="search"><input id="q" placeholder="Search a country…" autocomplete="off"><div class="results" id="res"></div></div>
  <span class="note">Drag to spin. Scroll to zoom. Click any country.</span>
</div>
<div class="wrap">
  <div class="map"><div id="glb"></div>
    <div class="legend">Sovereo Index (overall)<div class="legbar"></div><span style="float:left">low</span><span style="float:right">high</span></div>
  </div>
  <div class="panel" id="panel"><div class="hint">Pick a country on the globe or search above.<br><br>You will see its <b>Sovereo scorecard</b> and a <b>live signals feed</b>, each story tagged to the index pillar it touches.</div></div>
</div>
<script src="atlas-data.js"></script>
<script src="https://unpkg.com/globe.gl"></script>
<script>
var NEWS="https://sovereo-web.pages.dev/api/news?country=";
function norm(s){return (s||"").normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase().replace(/[^a-z]/g,"");}
var DATA=window.SOVEREO_ATLAS||[];
var BYISO={},BYNAME={};DATA.forEach(function(c){BYISO[c.iso]=c;BYNAME[norm(c.n)]=c;});
var ALIAS={unitedstatesofamerica:"unitedstates",republicofserbia:"serbia",czechrepublic:"czechia",bosniaandherzegovina:"bosniaandherzegovina",democraticrepublicofthecongo:"congodrc",republicofthecongo:"congorepublic",unitedrepublicoftanzania:"tanzania",ivorycoast:"cotedivoire",easttimor:"timorleste",swaziland:"eswatini",capeverde:"caboverde",macedonia:"northmacedonia",thebahamas:"bahamas",guineabissau:"guineabissau",southsudan:"southsudan",laos:"laos",brunei:"brunei"};
function lookup(f){var p=f.properties||{};var iso=p.ISO_A3||p.iso_a3||p.ADM0_A3;if(iso&&BYISO[iso])return BYISO[iso];var nm=p.ADMIN||p.NAME||p.name;var k=norm(nm);if(BYNAME[k])return BYNAME[k];if(ALIAS[k]&&BYNAME[ALIAS[k]])return BYNAME[ALIAS[k]];return null;}
function color(ov,a){var t=Math.max(0,Math.min(1,(ov-30)/(86-30)));var A=[38,54,79],B=[231,184,90];return "rgba("+Math.round(A[0]+(B[0]-A[0])*t)+","+Math.round(A[1]+(B[1]-A[1])*t)+","+Math.round(A[2]+(B[2]-A[2])*t)+","+(a==null?0.8:a)+")";}
var PILL=[["inc","Income","#E8A13C"],["edu","Education","#5C9CE0"],["hea","Health","#37B086"],["env","Environment","#6FB1C7"],["bel","Belonging","#C9739B"],["leg","Legacy","#9784CE"],["cap","Capital","#E2571E"]];
var PTAG={Legacy:"#9784CE",Capital:"#E2571E",Income:"#E8A13C",Safety:"#C9739B",Health:"#37B086",Environment:"#6FB1C7",Belonging:"#C9739B",General:"#8B95A3"};
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function bar(l,col,v){var w=v==null?0:v;return '<div class="prow"><div class="pnm">'+l+'</div><div class="ptrack"><div class="pfill" style="width:'+w+'%;background:'+col+'"></div></div><div class="pval">'+(v==null?"n/a":v)+'</div></div>';}
function select(c){
  var p=document.getElementById("panel");
  p.innerHTML='<div class="ctry">'+esc(c.n)+'</div><div class="reg">'+esc(c.region)+'</div>'+
  '<div class="ovrow"><div class="ov">'+c.ov+'</div><div class="ovlab">Sovereo<br>Index</div><div class="rank">Rank <b style="color:#E7B85A">'+c.rank+'</b><br>of 192</div></div>'+
  '<div class="plab">The six forces, plus capital</div>'+
  PILL.map(function(x){return bar(x[1],x[2],c[x[0]]);}).join("")+
  '<div class="sig" id="sig"><div class="plab">Live signals</div><div class="loading">Loading real headlines…</div></div>'+
  '<a class="cta" href="https://www.sovereo.com/Sovereo_Relocation_Diagnostic.html" target="_blank">See where you fit best, free →</a>';
  loadSignals(c);
}
function loadSignals(c){
  var el=document.getElementById("sig");
  var ctrl=new AbortController();var to=setTimeout(function(){ctrl.abort();},7000);
  fetch(NEWS+encodeURIComponent(c.n),{signal:ctrl.signal}).then(function(r){return r.ok?r.json():Promise.reject();}).then(function(d){
    clearTimeout(to);var a=(d&&d.articles)||[];
    if(!a.length){el.innerHTML='<div class="plab">Live signals</div><div class="loading">No fresh Sovereo-relevant stories in the last few weeks.</div>';return;}
    el.innerHTML='<div class="plab">Live signals</div>'+a.slice(0,8).map(function(x){var tg=x.pillar||"General";var col=PTAG[tg]||"#8B95A3";return '<a class="item" href="'+esc(x.url)+'" target="_blank" rel="noopener"><span class="tag" style="background:'+col+'22;color:'+col+'">'+tg+'</span><div class="it">'+esc(x.title)+'</div><div class="imeta">'+esc(x.source||"")+(x.time?" · "+esc(x.time):"")+'</div></a>';}).join("");
  }).catch(function(){clearTimeout(to);el.innerHTML='<div class="plab">Live signals</div><div class="loading">Live feed did not respond. Try again shortly.</div>';});
}
fetch("https://vasturiano.github.io/globe.gl/example/datasets/ne_110m_admin_0_countries.geojson").then(function(r){return r.json();}).then(function(geo){
  var feats=(geo.features||[]).filter(function(f){return (f.properties.ADMIN||f.properties.NAME)!=="Antarctica";});
  var world=Globe()(document.getElementById("glb"))
    .backgroundColor("#05080f")
    .globeImageUrl("//unpkg.com/three-globe/example/img/earth-blue-marble.jpg")
    .bumpImageUrl("//unpkg.com/three-globe/example/img/earth-topology.png")
    .backgroundImageUrl("//unpkg.com/three-globe/example/img/night-sky.png")
    .showAtmosphere(true).atmosphereColor("#5C9CE0").atmosphereAltitude(0.16)
    .polygonsData(feats)
    .polygonAltitude(function(f){return f.__hover?0.06:0.012;})
    .polygonCapColor(function(f){var c=lookup(f);return c?color(c.ov):"rgba(120,130,145,0.25)";})
    .polygonSideColor(function(){return "rgba(0,0,0,0.12)";})
    .polygonStrokeColor(function(){return "rgba(10,20,34,0.55)";})
    .polygonLabel(function(f){var c=lookup(f);var nm=(f.properties.ADMIN||f.properties.NAME||"");return c?('<div style="font-family:Inter,Arial;font-size:12.5px;background:#0E1A2B;color:#FBF8F1;border:1px solid #C8A45C;border-radius:6px;padding:5px 9px"><b style="color:#E7B85A">'+esc(nm)+'</b> · '+c.ov+' · #'+c.rank+'</div>'):('<div style="font-family:Inter,Arial;font-size:12px;background:#0E1A2B;color:#8B95A3;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 9px">'+esc(nm)+' · no data</div>');})
    .onPolygonHover(function(h){feats.forEach(function(d){d.__hover=(d===h);});world.polygonAltitude(function(f){return f.__hover?0.06:0.012;});})
    .onPolygonClick(function(f){var c=lookup(f);if(c){select(c);world.controls().autoRotate=false;}});
  var g=document.getElementById("glb");
  function size(){world.width(g.clientWidth).height(g.clientHeight);}
  size();window.addEventListener("resize",size);
  world.controls().autoRotate=true;world.controls().autoRotateSpeed=0.5;
  world.pointOfView({lat:20,lng:10,altitude:2.3},0);
});
var q=document.getElementById("q"),res=document.getElementById("res");
var LIST=DATA.slice().sort(function(a,b){return a.n.localeCompare(b.n);});
q.addEventListener("input",function(){var v=q.value.trim().toLowerCase();if(!v){res.style.display="none";return;}
  var m=LIST.filter(function(c){return c.n.toLowerCase().indexOf(v)>-1;}).slice(0,8);
  res.innerHTML=m.map(function(c){return '<div data-n="'+esc(c.n)+'">'+esc(c.n)+' <span style="color:#8B95A3;font-size:12px">· '+c.ov+' · #'+c.rank+'</span></div>';}).join("");
  res.style.display=m.length?"block":"none";});
res.addEventListener("click",function(e){var d=e.target.closest("[data-n]");if(!d)return;var c=BYNAME[norm(d.getAttribute("data-n"))];if(c){select(c);res.style.display="none";q.value=c.n;}});
document.addEventListener("click",function(e){if(!e.target.closest(".search"))res.style.display="none";});
</script>
</body></html>
